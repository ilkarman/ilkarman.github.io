- title: "Eclair: Extracting Content and Layout with Integrated Reading Order for Documents"
  authors: <strong>I Karmanov (first author)</strong>, A Deshmukh, L Voegtle, P Fischer, K Chumachenko, T Roman, J Seppanen, J Parmar, J Jennings, A Tao, K Sapra
  conference: arXiv 2025
  year: 2025
  venue_badge: First Author
  paper_link: https://arxiv.org/abs/2502.04223
  highlight: true
  description: "General-purpose document digitization model that simultaneously extracts formatted text (markdown/LaTeX), bounding boxes with semantic classes, and reading order. Introduces the DROBS benchmark."

- title: "Eagle 2: Building Post-Training Data Strategies from Scratch for Frontier Vision-Language Models"
  authors: Z Li, G Chen, S Liu, ... <strong>I Karmanov</strong>, L Voegtle, P Fischer, ... Z Yu (27 authors)
  conference: arXiv 2025
  year: 2025
  venue_badge: NVIDIA
  paper_link: https://arxiv.org/abs/2501.14818
  code_link: https://github.com/NVlabs/Eagle
  description: "Data-centric approach to VLM post-training. Eagle2-9B matches models with up to 70B parameters. Later adopted as the VLM backbone of NVIDIA's GR00T-N1 robotic foundation model."

