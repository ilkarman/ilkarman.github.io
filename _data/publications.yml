- title: "Nemotron-H: A Family of Accurate and Efficient Hybrid Mamba-Transformer Models"
  authors: 199 authors including <strong>I Karmanov</strong>
  conference: arXiv 2025
  year: 2025
  venue_badge: NVIDIA
  paper_link: https://arxiv.org/abs/2504.03624
