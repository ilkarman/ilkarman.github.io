- title: "Eclair"
  abstract: "First-authored multimodal encoder-decoder for document understanding. Originated the architectural choices (no positional encoding in the decoder, chained multi-token prediction). Used across NVIDIA's training pipelines: 50B+ tokens to LLM pre-training, teacher for VLM OCR distillation, pseudo-labeler for VLM training data, and text extractor grounding synthetic VQA generation."
  link: https://arxiv.org/abs/2502.04223
  tags: "Document AI, Vision-Language Models, Multimodal Pre-training"

- title: "NVIDIA Nemotron Parse"
  abstract: "Senior author on the Nemotron Parse 1.1 follow-up to Eclair. Open weights, optimized NIM container, deployed via NVIDIA's build platform. v1.1 adds a token-compressed variant with 20% speed gain, improved reading order, and longer output sequences."
  link: https://build.nvidia.com/nvidia/nemotron-parse
  tags: "Document Parsing, Production ML, Model Deployment"

- title: "Eagle 2 (NVlabs)"
  abstract: "Contributed to NVIDIA's vision-language model. Eagle2-9B matches 70B+ parameter models. Serves as the VLM backbone of the GR00T-N1 robotic foundation model."
  link: https://github.com/NVlabs/Eagle
  tags: "Vision-Language Models, Foundation Models"

- title: "Lung Disease Prediction from Chest X-Rays"
  abstract: "Co-authored work on lung disease prediction using DenseNet-121 on the NIH Chest X-ray dataset (112K images, 14 pathologies). Published on the Microsoft ML Blog."
  link: https://learn.microsoft.com/en-us/archive/blogs/machinelearning/using-microsoft-ai-to-build-a-lung-disease-prediction-model-using-chest-x-ray-images
  tags: "Medical Imaging, Computer Vision"

- title: "Deep Learning Framework Comparisons"
  abstract: "Benchmarking deep learning frameworks (TensorFlow, PyTorch, MXNet, CNTK, Keras, etc.) on common architectures. 1,700+ GitHub stars, contributions from framework creators."
  link: https://github.com/ilkarman/DeepLearningFrameworks
  tags: "Open Source, Deep Learning, Benchmarking"
