- title: "Eclair"
  abstract: "First author of Eclair, a document-understanding model that extracts formatted text, tables, formulas, and reading order. Asymmetric design (larger vision encoder, lightweight decoder), no positional embeddings in the decoder, multi-token prediction, and a single prompt-controlled output format. Adopted across NVIDIA's pipelines for pre-training data (50B+ tokens) and VLM distillation; shipped as Nemotron Parse."
  link: https://arxiv.org/abs/2502.04223
  tags: "Document AI, Vision-Language Models, Multimodal Pre-training"

- title: "NVIDIA Nemotron Parse"
  abstract: "Co-author of Nemotron Parse 1.1, the productized follow-up to my first-authored Eclair. Open weights, optimized NIM container, deployed via NVIDIA's build platform. v1.1 adds a token-compressed variant (20% speed gain), improved reading order, and longer output sequences."
  link: https://build.nvidia.com/nvidia/nemotron-parse
  tags: "Document Parsing, Production ML, Model Deployment"

- title: "Nemotron VLMs (Nano V2 VL, Nano 3 Omni)"
  abstract: "NVIDIA's vision-language and omni-modal models (Nano V2 VL, Nano 3 Omni) for document understanding, long video, and reasoning. I work on their post-training (GRPO and on-policy distillation) and long-context evaluation (e.g. MMLongBench); the models build on pre-trained backbones."
  link: https://arxiv.org/abs/2511.03929
  tags: "Vision-Language Models, Post-Training, Reinforcement Learning"

- title: "Eagle 2 (NVlabs)"
  abstract: "Contributed to the token-compression design for dense OCR. Eagle2-9B matches 70B+ models and is the VLM backbone of NVIDIA's GR00T-N1 robotic foundation model."
  link: https://github.com/NVlabs/Eagle
  tags: "Vision-Language Models, Foundation Models"

- title: "Deep Learning Framework Comparisons"
  abstract: "Benchmarking deep learning frameworks (TensorFlow, PyTorch, MXNet, CNTK, Keras, etc.) on common architectures. 1,700+ GitHub stars, contributions from framework creators."
  link: https://github.com/ilkarman/DeepLearningFrameworks
  tags: "Open Source, Deep Learning, Benchmarking"
